name: DiracX-Web Components Tests

on:
  push:
    paths:
      - 'packages/diracx-web-components/**'
      - 'package.json'
      - 'package-lock.json'
    branches-ignore:
      - renovate/**
      - release-please-**
  pull_request:
    paths:
      - 'packages/diracx-web-components/**'
      - 'package.json'
      - 'package-lock.json'
    branches-ignore:
      - release-please-**

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.repository == 'DIRACGrid/diracx-web'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
              
      - name: Trigger unit tests
        run: npm --prefix packages/diracx-web-components run test
